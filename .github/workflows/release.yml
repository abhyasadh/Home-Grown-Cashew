name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cashew-server

jobs:
  build-mobile:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: budget
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate release keystore
        working-directory: budget/android
        run: |
          keytool -genkey -v \
            -keystore release-key.jks \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD || 'android' }}" \
            -keypass "${{ secrets.KEY_PASSWORD || 'android' }}" \
            -dname "CN=Home Grown Cashew"

      - name: Create key.properties
        working-directory: budget/android
        run: |
          cat > key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          keyPassword=${{ secrets.KEY_PASSWORD || 'android' }}
          keyAlias=release
          storeFile=release-key.jks
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: [build-mobile, build-and-push-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: aab
          path: artifacts

      - name: Rename artifacts with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv artifacts/app-release.apk artifacts/cashew-${VERSION}-release.apk
          mv artifacts/app-release.aab artifacts/cashew-${VERSION}-release.aab
          sha256sum artifacts/cashew-${VERSION}-release.apk > artifacts/cashew-${VERSION}-release.apk.sha256
          sha256sum artifacts/cashew-${VERSION}-release.aab > artifacts/cashew-${VERSION}-release.aab.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/cashew-*-release.apk
            artifacts/cashew-*-release.aab
            artifacts/cashew-*-release.apk.sha256
            artifacts/cashew-*-release.aab.sha256
